<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="StudyFlow">
<meta name="theme-color" content="#F4F6FB">
<title>StudyFlow</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<style>
:root{
  --bg:#F4F6FB;--sf:#FFF;--sf2:#F8FAFF;--bd:#DDE3F0;--bd2:#E8EDFA;
  --t:#1A1D2E;--t2:#3D4260;--t3:#6B7094;--t4:#A8ADC8;
  --acc:#4F72E3;--acc2:#3A5CC8;--acc-bg:#EEF3FF;--acc-mid:#D4E0FA;
  --flip-bg:#EEF3FF;--flip-t:#1E3A8A;--flip-bd:#C5D4F8;
  --red:#E05252;--red-bg:#FFF5F5;--red-bd:#FFC5C5;
  --ok:#2A7D46;--ok-bg:#F0FDF4;--ok-bd:#BBF7D0;
  --am:#B45309;--am-bg:#FFFBEB;
  --r:14px;--rsm:9px;--rlg:20px;
  --sh:0 1px 3px rgba(0,0,0,.04),0 4px 16px rgba(0,0,0,.05);
  --shlg:0 8px 40px rgba(79,114,227,.14);
  --nav:58px;--st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px);
  --font:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{font-size:16px}
body{font-family:var(--font);background:var(--bg);color:var(--t);-webkit-font-smoothing:antialiased;min-height:100vh;overscroll-behavior:none}
::selection{background:var(--acc-mid)}
input,textarea,select,button{font-family:inherit;font-size:inherit}
button{cursor:pointer}
img{max-width:100%;height:auto;display:block}

/* RESPONSIVE PAGE */
.page{max-width:680px;margin:0 auto;padding:22px 14px 90px}
@media(min-width:600px){.page{padding:26px 20px 90px}}
@media(min-width:1024px){.page{max-width:780px;padding:32px 28px 100px}}
@media(min-width:1400px){.page{max-width:960px}}

/* RESPONSIVE SET GRID */
.sets-grid{display:flex;flex-direction:column;gap:10px}
@media(min-width:900px){.sets-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}}
@media(min-width:1400px){.sets-grid{grid-template-columns:1fr 1fr 1fr}}

/* NAV */
.nav{position:sticky;top:0;z-index:90;height:calc(var(--nav) + var(--st));padding-top:var(--st);
  background:rgba(244,246,251,.94);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--bd2);display:flex;align-items:flex-end}
.nav-in{width:100%;max-width:780px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:0 14px 10px}
@media(min-width:600px){.nav-in{padding:0 20px 10px}}
@media(min-width:1024px){.nav-in{max-width:960px}}
.logo{display:flex;align-items:center;gap:8px;font-weight:800;font-size:17px;color:var(--t);letter-spacing:-.03em}
.logo-m{width:28px;height:28px;background:var(--acc);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:800;letter-spacing:-.02em}
.nav-back{display:flex;align-items:center;gap:3px;color:var(--acc);font-size:14px;font-weight:600;background:none;border:none;padding:5px 0;letter-spacing:-.01em}
.nav-back svg{width:16px;height:16px;stroke:currentColor;stroke-width:2.2;fill:none;stroke-linecap:round;stroke-linejoin:round}
.nav-title{font-size:14px;font-weight:700;color:var(--t);max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:-.01em}
@media(min-width:600px){.nav-title{max-width:260px}}
.nav-acts{display:flex;gap:4px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:none;border-radius:var(--rsm);font-weight:600;font-size:14px;padding:10px 16px;cursor:pointer;transition:all .16s cubic-bezier(.4,0,.2,1);-webkit-user-select:none;user-select:none;letter-spacing:-.01em;white-space:nowrap}
.btn:active{transform:scale(.95)}
.btn-blue{background:var(--acc);color:#fff;box-shadow:0 2px 8px rgba(79,114,227,.28)}
.btn-blue:hover{background:var(--acc2)}
.btn-ghost{background:transparent;color:var(--t2);border:1.5px solid var(--bd)}
.btn-ghost:hover{border-color:var(--acc-mid);background:var(--acc-bg);color:var(--acc)}
.btn-danger{background:var(--red-bg);color:var(--red);border:1.5px solid var(--red-bd)}
.btn-danger:hover{background:#FFE8E8}
.btn-sm{padding:7px 12px;font-size:13px;border-radius:8px}
.btn-full{width:100%}
.btn:disabled{opacity:.38;cursor:not-allowed;transform:none}
.ibt{width:36px;height:36px;border-radius:8px;background:transparent;border:none;display:flex;align-items:center;justify-content:center;color:var(--t3);transition:all .14s}
.ibt:hover{background:var(--acc-bg);color:var(--acc)}
.ibt svg{width:16px;height:16px;stroke:currentColor;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round}

/* INPUTS */
.fld{margin-bottom:16px}
.lbl{display:block;font-size:11px;font-weight:700;color:var(--t4);letter-spacing:.06em;text-transform:uppercase;margin-bottom:7px}
.inp{width:100%;padding:12px 14px;border:1.5px solid var(--bd);border-radius:var(--rsm);background:var(--sf);color:var(--t);font-size:15px;outline:none;transition:border-color .14s,box-shadow .14s;-webkit-appearance:none;font-family:var(--font)}
.inp:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(79,114,227,.1)}
.inp::placeholder{color:var(--t4)}
textarea.inp{resize:vertical;min-height:88px;line-height:1.65;font-size:14px}
select.inp{cursor:pointer}
.inp-hint{font-size:11px;color:var(--t4);margin-top:5px;line-height:1.5;font-weight:500}

/* SURFACE CARD */
.card{background:var(--sf);border-radius:var(--rlg);border:1px solid var(--bd2);box-shadow:var(--sh)}
.cp{padding:20px}

/* SET CARD */
.sc{background:var(--sf);border-radius:var(--rlg);border:1px solid var(--bd2);box-shadow:var(--sh);cursor:pointer;transition:transform .2s cubic-bezier(.4,0,.2,1),box-shadow .2s;overflow:hidden;-webkit-user-select:none;user-select:none}
.sc:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(79,114,227,.12)}
.sc:active{transform:scale(.985)}
.sc-body{padding:20px}
.sc-tag{font-size:10px;font-weight:700;color:var(--acc);letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px}
.sc-title{font-size:20px;font-weight:800;color:var(--t);line-height:1.2;margin-bottom:10px;letter-spacing:-.025em}
.sc-foot{padding:10px 20px;background:var(--sf2);border-top:1px solid var(--bd2);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}

/* DEADLINE */
.dl-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px;margin-top:4px}
.dl-soon{background:#FFF3F3;color:var(--red)}.dl-ok{background:var(--acc-bg);color:var(--acc)}.dl-done{background:var(--ok-bg);color:var(--ok)}

/* PROGRESS */
.pbar{height:3px;background:var(--bd2);border-radius:2px;overflow:hidden}
.pfill{height:100%;border-radius:2px;transition:width 1.2s cubic-bezier(.4,0,.2,1)}
.p-ok{background:linear-gradient(90deg,#34C96C,#2A7D46)}.p-mid{background:linear-gradient(90deg,#F6A623,#B45309)}.p-low{background:var(--acc-mid)}

/* PILL */
.pill{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700}
.pl-ok{background:var(--ok-bg);color:var(--ok)}.pl-mid{background:var(--am-bg);color:var(--am)}.pl-low{background:var(--acc-bg);color:var(--acc)}
.pl-dot{width:5px;height:5px;border-radius:50%}

/* RING */
.ring{position:relative;flex-shrink:0}
.ring-c{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-n{font-size:13px;font-weight:800;line-height:1;color:var(--t)}
.ring-d{font-size:9px;color:var(--t4);line-height:1;font-weight:600}

/* FLIP CARD */
.scene{perspective:1600px;cursor:pointer;-webkit-user-select:none;user-select:none}
.flipcard{transform-style:preserve-3d;transition:transform .65s cubic-bezier(.35,.15,.2,1);position:relative}
.flipcard.flipped{transform:rotateY(180deg)}
.face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:var(--rlg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:26px 20px;overflow:hidden}
.f-front{background:var(--sf);border:1px solid var(--bd2);box-shadow:var(--sh)}
.f-back{background:var(--flip-bg);border:1.5px solid var(--flip-bd);box-shadow:var(--shlg);transform:rotateY(180deg);overflow-y:auto}
.f-tag{font-size:10px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;margin-bottom:12px;opacity:.5;flex-shrink:0}
.f-q{font-size:18px;font-weight:700;text-align:center;line-height:1.5;color:var(--t);letter-spacing:-.01em}
.f-a{font-size:15px;text-align:center;line-height:1.8;color:var(--flip-t);font-weight:600;margin-bottom:10px;flex-shrink:0}
.f-hint{position:absolute;bottom:13px;font-size:10px;color:var(--t4);letter-spacing:.04em;font-weight:500}
.f-formula{font-family:'Menlo','SF Mono',monospace;font-size:13px;background:rgba(79,114,227,.08);color:var(--flip-t);padding:10px 14px;border-radius:8px;white-space:pre-wrap;word-break:break-all;text-align:left;width:100%;line-height:1.7;margin-bottom:10px;flex-shrink:0}
/* BIG IMAGE / CANVAS on back */
.f-img{max-width:100%;max-height:260px;border-radius:10px;margin-top:10px;object-fit:contain;flex-shrink:0}
.f-cv-page{max-width:100%;border-radius:8px;margin-top:8px;border:1px solid var(--flip-bd);flex-shrink:0}
@media(min-width:600px){.f-img{max-height:340px}}

/* ANS BUTTONS */
.ans-row{display:flex;gap:10px;margin-top:14px}
.a-no{flex:1;padding:14px;border-radius:var(--r);border:1.5px solid var(--bd);background:var(--sf);color:var(--t3);font-size:14px;font-weight:600;cursor:pointer;transition:all .16s;display:flex;align-items:center;justify-content:center;gap:7px;letter-spacing:-.01em}
.a-yes{flex:1;padding:14px;border-radius:var(--r);border:1.5px solid var(--acc);background:var(--acc);color:#fff;font-size:14px;font-weight:600;cursor:pointer;transition:all .16s;display:flex;align-items:center;justify-content:center;gap:7px;letter-spacing:-.01em}
.a-no:hover{background:var(--red-bg);border-color:var(--red-bd);color:var(--red)}
.a-yes:hover{background:var(--acc2)}
.a-no:active,.a-yes:active{transform:scale(.96)}

/* QUIZ */
.choice{width:100%;text-align:left;padding:12px 14px;border-radius:var(--rsm);border:1.5px solid var(--bd);background:var(--sf);display:flex;align-items:flex-start;gap:10px;font-size:14px;line-height:1.5;color:var(--t2);cursor:pointer;transition:all .13s;font-family:var(--font);font-weight:500}
.choice:active{transform:scale(.988)}
.c-lbl{width:26px;height:26px;border-radius:7px;background:var(--sf2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--t3);flex-shrink:0;margin-top:1px;border:1.5px solid var(--bd);transition:all .13s}
.choice.sel{border-color:var(--acc);background:var(--acc-bg)}.choice.sel .c-lbl{background:var(--acc);color:#fff;border-color:var(--acc)}
.choice.correct{border-color:var(--ok);background:var(--ok-bg)}.choice.correct .c-lbl{background:var(--ok);color:#fff;border-color:var(--ok)}
.choice.wrong{border-color:var(--red);background:var(--red-bg)}.choice.wrong .c-lbl{background:var(--red);color:#fff;border-color:var(--red)}

/* CARD LIST ITEM */
.ci{background:var(--sf);border-radius:var(--r);border:1px solid var(--bd2);overflow:hidden;transition:box-shadow .16s}
.ci:hover{box-shadow:0 2px 12px rgba(79,114,227,.08)}
.ci-q{padding:13px 16px 9px;font-size:14px;font-weight:700;color:var(--t);line-height:1.4;border-bottom:1px solid var(--bd2)}
.ci-a{padding:9px 16px;font-size:13px;color:var(--t2);line-height:1.65;background:var(--sf2)}
.ci-foot{padding:7px 11px;background:var(--sf2);border-top:1px solid var(--bd2);display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.ci-img-thumb{width:52px;height:38px;object-fit:cover;border-radius:5px;border:1px solid var(--bd);cursor:zoom-in;flex-shrink:0}
.ci-cv-thumb{width:52px;height:38px;object-fit:cover;border-radius:5px;border:1px solid var(--bd);cursor:pointer;flex-shrink:0}

/* CANVAS OVERLAY */
.cv-ov{position:fixed;inset:0;z-index:300;background:var(--bg);display:flex;flex-direction:column}
.cv-tb{background:var(--sf);border-bottom:1px solid var(--bd2);padding:8px 12px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;flex-shrink:0;padding-top:calc(8px + var(--st))}
.cv-wrap{flex:1;overflow:auto;background:#E0E4F0;position:relative;display:block}
.cv-zoom-layer{display:inline-block;transform-origin:0 0;padding:20px}
.cv-container{position:relative;display:inline-block;box-shadow:0 4px 32px rgba(0,0,0,.15)}
#cv-grid{position:absolute;top:0;left:0;pointer-events:none;display:block}
#cv-draw{position:absolute;top:0;left:0;touch-action:none;display:block}
.cv-bar{padding:6px 14px;background:var(--sf);border-top:1px solid var(--bd2);font-size:10px;color:var(--t4);display:flex;justify-content:space-between;align-items:center;flex-shrink:0;padding-bottom:calc(6px + var(--sb));font-weight:600}
.tb{width:34px;height:34px;border-radius:8px;border:1.5px solid var(--bd);background:var(--sf);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;transition:all .12s;color:var(--t2);flex-shrink:0}
.tb.on{border-color:var(--acc);background:var(--acc-bg);color:var(--acc)}
.tb:active{transform:scale(.92)}
.cdot{width:22px;height:22px;border-radius:50%;border:2.5px solid transparent;cursor:pointer;flex-shrink:0;transition:border-color .12s}
.cdot.on{border-color:var(--acc)}
.cv-sep{width:1px;height:26px;background:var(--bd);flex-shrink:0}

/* MODAL */
.backdrop{position:fixed;inset:0;background:rgba(26,29,46,.38);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;animation:fi .18s ease}
.modal{background:var(--sf);border-radius:20px;width:100%;max-width:340px;padding:26px 22px;box-shadow:0 12px 56px rgba(0,0,0,.18);animation:po .22s cubic-bezier(.4,0,.2,1)}
.modal h3{font-size:18px;font-weight:800;color:var(--t);margin-bottom:8px;letter-spacing:-.02em}
.modal p{font-size:14px;color:var(--t3);line-height:1.6;margin-bottom:20px;font-weight:500}
.modal-btns{display:flex;gap:10px}

/* PDF */
.pdf-row{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--sf);border:1px solid var(--bd2);border-radius:var(--rsm);margin-bottom:16px}
.pdf-ic{width:36px;height:36px;background:var(--red-bg);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pdf-ic svg{width:18px;height:18px;stroke:var(--red);stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round}

/* LIGHTBOX */
.lb{position:fixed;inset:0;z-index:600;background:rgba(0,0,0,.92);display:flex;align-items:center;justify-content:center;cursor:zoom-out;animation:fi .15s;padding:16px}
.lb img{max-width:100%;max-height:100%;object-fit:contain;border-radius:8px;animation:po .2s}

/* EMPTY */
.empty{text-align:center;padding:48px 20px;display:flex;flex-direction:column;align-items:center;gap:10px}
.empty-ic{width:52px;height:52px;border-radius:16px;background:var(--acc-bg);display:flex;align-items:center;justify-content:center}
.empty-ic svg{width:24px;height:24px;stroke:var(--acc);stroke-width:1.7;fill:none;stroke-linecap:round;stroke-linejoin:round}
.empty-t{font-size:16px;font-weight:700;color:var(--t2);letter-spacing:-.01em}
.empty-s{font-size:13px;color:var(--t3);line-height:1.55;max-width:230px;font-weight:500}

/* TOAST */
#toasts{position:fixed;top:calc(var(--nav) + var(--st) + 10px);left:50%;transform:translateX(-50%);z-index:700;display:flex;flex-direction:column;gap:7px;align-items:center;pointer-events:none}
.toast{padding:10px 18px;border-radius:12px;font-size:13px;font-weight:700;background:rgba(26,29,46,.92);color:#fff;backdrop-filter:blur(10px);animation:sd .2s ease;white-space:nowrap;letter-spacing:-.01em}
.toast.ok{background:rgba(42,125,70,.92)}.toast.err{background:rgba(224,82,82,.92)}

/* RESULT */
.res-wrap{display:flex;flex-direction:column;align-items:center;gap:16px;padding:44px 20px 20px;text-align:center}
.res-ring{flex-shrink:0}
.res-pct-num{font-size:28px;font-weight:800;letter-spacing:-.04em;line-height:1}
.res-pct-lbl{font-size:9px;font-weight:700;color:var(--t4);letter-spacing:.07em;text-transform:uppercase;margin-top:2px}
.res-title{font-size:22px;font-weight:800;letter-spacing:-.03em;color:var(--t)}
.res-sub{font-size:14px;color:var(--t3);font-weight:500}

/* SECTION */
.sec{font-size:10px;font-weight:700;color:var(--t4);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}

/* STAT GRID */
.sg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.stat{background:var(--sf2);border-radius:var(--r);border:1px solid var(--bd2);padding:12px;text-align:center}
.stat-n{font-size:22px;font-weight:800;line-height:1;margin-bottom:3px;letter-spacing:-.03em}
.stat-l{font-size:10px;color:var(--t4);font-weight:700;letter-spacing:.03em}

/* LATEX PREVIEW */
.lp{min-height:52px;padding:12px 13px;border:1.5px dashed var(--bd);border-radius:var(--rsm);font-size:16px;line-height:2;background:var(--sf2);color:var(--t);word-break:break-word;transition:border-color .14s}
.lp:focus-within{border-color:var(--acc)}

/* RANGE SLIDER */
input[type=range]{-webkit-appearance:none;appearance:none;height:4px;border-radius:2px;background:var(--bd);outline:none;cursor:pointer;width:80px}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--acc);cursor:pointer;box-shadow:0 1px 4px rgba(79,114,227,.4)}

/* ANIMATIONS */
@keyframes fi{from{opacity:0}to{opacity:1}}
@keyframes po{from{transform:scale(.93);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes sd{from{transform:translateY(-9px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.a0{animation:up .28s ease both}.a1{animation:up .28s .06s ease both}.a2{animation:up .28s .12s ease both}.a3{animation:up .28s .18s ease both}.a4{animation:up .28s .24s ease both}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
</style>
</head>
<body>
<div id="app"></div>
<div id="toasts"></div>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
<script>
'use strict';

// ═══════════════════════════════════
// INDEXED DB
// ═══════════════════════════════════
const IDB = {
  db: null,
  async init() {
    return new Promise((res, rej) => {
      const r = indexedDB.open('sf5', 1);
      r.onupgradeneeded = e => {
        if (!e.target.result.objectStoreNames.contains('b'))
          e.target.result.createObjectStore('b');
      };
      r.onsuccess = e => { this.db = e.target.result; res(); };
      r.onerror = () => rej(r.error);
    });
  },
  store(m) { return this.db.transaction('b', m).objectStore('b'); },
  async save(k, v) { return new Promise((res, rej) => { const r = this.store('readwrite').put(v, k); r.onsuccess = res; r.onerror = () => rej(r.error); }); },
  async get(k) { return new Promise((res, rej) => { const r = this.store('readonly').get(k); r.onsuccess = () => res(r.result ?? null); r.onerror = () => rej(r.error); }); },
  async del(k) { return new Promise((res, rej) => { const r = this.store('readwrite').delete(k); r.onsuccess = res; r.onerror = () => rej(r.error); }); },
  async keys() { return new Promise((res, rej) => { const r = this.store('readonly').getAllKeys(); r.onsuccess = () => res(r.result ?? []); r.onerror = () => rej(r.error); }); },
  async delPfx(pfx) { const ks = await this.keys(); for (const k of ks) if (String(k).startsWith(pfx)) await this.del(k); },
};

// ═══════════════════════════════════
// LOCAL STORAGE
// ═══════════════════════════════════
const DB = {
  _g(k) { try { return JSON.parse(localStorage.getItem('sf_' + k)) ?? null; } catch { return null; } },
  _s(k, v) { localStorage.setItem('sf_' + k, JSON.stringify(v)); },
  uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); },
  getSets() { return this._g('sets') ?? []; },
  getSet(id) { return this.getSets().find(s => s.id === id) ?? null; },
  saveSet(s) {
    const sets = this.getSets(); const i = sets.findIndex(x => x.id === s.id);
    s.upd = Date.now();
    if (i >= 0) sets[i] = s; else { s.cre = Date.now(); sets.unshift(s); }
    this._s('sets', sets);
  },
  async delSet(id) {
    const cids = this.getCards(id).map(c => c.id);
    this._s('sets', this.getSets().filter(s => s.id !== id));
    this._s('cards', this.getCards().filter(c => c.setId !== id));
    this._s('reps', this.getReps().filter(r => !cids.includes(r.cid)));
    for (const cid of cids) await IDB.delPfx('cv_' + cid);
    await IDB.delPfx('im_' + id);
    await IDB.del('pdf_' + id);
  },
  getCards(sid) { const all = this._g('cards') ?? []; return sid ? all.filter(c => c.setId === sid) : all; },
  getCard(id) { return (this._g('cards') ?? []).find(c => c.id === id) ?? null; },
  saveCard(c) {
    const cards = this._g('cards') ?? []; const i = cards.findIndex(x => x.id === c.id);
    c.upd = Date.now();
    if (i >= 0) cards[i] = c; else { c.cre = Date.now(); cards.push(c); }
    this._s('cards', cards);
  },
  async delCard(id) {
    const c = this.getCard(id);
    this._s('cards', (this._g('cards') ?? []).filter(x => x.id !== id));
    this._s('reps', this.getReps().filter(r => r.cid !== id));
    if (c) {
      if (c.ansImg) await IDB.del('im_' + c.setId + '_' + c.id);
      if ((c.cvPages || 0) > 0) await IDB.delPfx('cv_' + c.id);
    }
  },
  getReps() { return this._g('reps') ?? []; },
  getRep(cid) { return this.getReps().find(r => r.cid === cid) ?? null; },
  saveRep(r) { const reps = this.getReps(); const i = reps.findIndex(x => x.cid === r.cid); if (i >= 0) reps[i] = r; else reps.push(r); this._s('reps', reps); },
};

// ═══════════════════════════════════
// BACKUP — Export, Link, Import
// ═══════════════════════════════════

// Erkennt ob App in einem iframe läuft (Claude-Vorschau etc.)
function inIframe() { try { return window.self !== window.top; } catch (e) { return true; } }

// iOS erkennen
function isIOS() { return /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream; }

// Zeigt einen Modal mit kopierbarem Text/Link
function showCopyModal(title, content, hint) {
  const ex = document.getElementById('copy-modal'); if (ex) ex.remove();
  const el = document.createElement('div');
  el.id = 'copy-modal'; el.className = 'backdrop';
  const safeTitle = title.replace(/</g,'&lt;');
  const safeHint = (hint||'').replace(/</g,'&lt;');
  el.innerHTML = '<div class="modal" style="max-width:420px">'
    + '<h3>' + safeTitle + '</h3>'
    + (safeHint ? '<p>' + safeHint + '</p>' : '')
    + '<textarea id="copy-ta" style="width:100%;height:90px;font-size:11px;padding:10px;border:1.5px solid var(--bd);border-radius:8px;resize:none;font-family:monospace;background:var(--sf2);color:var(--t);margin-bottom:12px" readonly></textarea>'
    + '<div class="modal-btns">'
    + '<button class="btn btn-ghost" style="flex:1" onclick="document.getElementById(\'copy-modal\').remove()">Schließen</button>'
    + '<button class="btn btn-blue" style="flex:1" id="copy-btn">Kopieren</button>'
    + '</div></div>';
  document.body.appendChild(el);
  el.onclick = e => { if (e.target === el) el.remove(); };
  const ta = document.getElementById('copy-ta');
  ta.value = content;
  ta.select();
  document.getElementById('copy-btn').onclick = () => {
    ta.select(); ta.setSelectionRange(0, 99999);
    try {
      navigator.clipboard.writeText(content).then(() => toast('Kopiert', 'ok')).catch(() => {
        document.execCommand('copy'); toast('Kopiert', 'ok');
      });
    } catch (e) { document.execCommand('copy'); toast('Kopiert', 'ok'); }
  };
}

const BACKUP = {

  // ── Alle Daten sammeln ──
  async collectAll() {
    const sets   = DB.getSets();
    const cards  = DB.getCards();
    const reps   = DB.getReps();
    const allKeys = await IDB.keys();
    const blobs = {};
    for (const k of allKeys) {
      const val = await IDB.get(k);
      if (!val) continue;
      if (val instanceof ArrayBuffer) {
        const bytes = new Uint8Array(val);
        let bin = '';
        for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
        blobs[k] = { t: 'ab', d: btoa(bin) };
      } else {
        blobs[k] = { t: 's', d: val };
      }
    }
    return { v: 3, at: new Date().toISOString(), sets, cards, reps, blobs };
  },

  // ── Datei exportieren ──
  async exportFile() {
    try {
      toast('Backup wird erstellt…', '', 1500);
      const payload = await this.collectAll();
      const json = JSON.stringify(payload);
      const date = new Date().toISOString().slice(0, 10);
      const fname = 'studyflow-backup-' + date + '.json';
      const blobObj = new Blob([json], { type: 'application/json' });
      const url = URL.createObjectURL(blobObj);

      // Versuch 1: Web Share API (nur außerhalb von iframes, iOS 15+)
      if (!inIframe() && typeof navigator.share === 'function') {
        try {
          const file = new File([json], fname, { type: 'application/json' });
          const canFile = navigator.canShare && navigator.canShare({ files: [file] });
          if (canFile) {
            await navigator.share({ title: 'StudyFlow Backup', files: [file] });
            URL.revokeObjectURL(url); return;
          }
        } catch (e) {
          if (e.name === 'AbortError') { URL.revokeObjectURL(url); return; }
          // Weitermachen mit Fallback
        }
      }

      // Versuch 2: Neuer Tab (funktioniert auf iOS Safari)
      if (isIOS()) {
        const newTab = window.open(url, '_blank');
        if (newTab) {
          toast('Datei geöffnet — tippe Teilen → In Dateien sichern', '', 5000);
          setTimeout(() => URL.revokeObjectURL(url), 10000); return;
        }
      }

      // Versuch 3: Download-Link (Desktop)
      const a = document.createElement('a');
      a.href = url; a.download = fname;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 4000);
      toast('Backup heruntergeladen', 'ok');
    } catch (e) {
      toast('Export fehlgeschlagen: ' + e.message, 'err');
    }
  },

  // ── Backup-Link erstellen (nur Texte) ──
  async exportLink() {
    try {
      const data = { v: 3, at: new Date().toISOString(), sets: DB.getSets(), cards: DB.getCards(), reps: DB.getReps() };
      const json = JSON.stringify(data);
      let encoded;

      // Kompression versuchen
      try {
        const cs = new CompressionStream('gzip');
        const writer = cs.writable.getWriter();
        writer.write(new TextEncoder().encode(json)); writer.close();
        const buf = await new Response(cs.readable).arrayBuffer();
        const bytes = new Uint8Array(buf);
        let bin = '';
        for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
        encoded = 'gz.' + btoa(bin).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
      } catch (_) {
        encoded = 'j.' + btoa(unescape(encodeURIComponent(json))).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
      }

      const appUrl = location.href.split('#')[0];
      const link = appUrl + '#sf=' + encoded;

      // Versuch 1: Web Share (außerhalb iframe)
      if (!inIframe() && typeof navigator.share === 'function') {
        try { await navigator.share({ title: 'StudyFlow Backup', url: link }); return; }
        catch (e) { if (e.name === 'AbortError') return; }
      }

      // Versuch 2: Clipboard
      try {
        await navigator.clipboard.writeText(link);
        toast('Link in Zwischenablage kopiert', 'ok', 3500); return;
      } catch (_) { }

      // Versuch 3: Modal zum manuellen Kopieren
      showCopyModal(
        'Backup-Link',
        link,
        'Link kopieren und auf einem anderen Gerät öffnen. Enthält nur Texte (keine Bilder).'
      );
    } catch (e) {
      if (e.name !== 'AbortError') toast('Link-Export fehlgeschlagen: ' + e.message, 'err');
    }
  },

  // ── URL-Hash beim Start prüfen ──
  async checkUrlHash() {
    const hash = location.hash;
    if (!hash.startsWith('#sf=')) return;
    const encoded = hash.slice(4);
    history.replaceState(null, '', location.pathname + location.search);
    let data;
    try {
      const b64 = encoded.replace(/-/g, '+').replace(/_/g, '/');
      if (encoded.startsWith('gz.')) {
        const bin = atob(b64.slice(3));
        const bytes = new Uint8Array(bin.length);
        for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
        const ds = new DecompressionStream('gzip');
        const writer = ds.writable.getWriter();
        writer.write(bytes); writer.close();
        data = JSON.parse(await new Response(ds.readable).text());
      } else {
        data = JSON.parse(decodeURIComponent(escape(atob(b64.slice(2)))));
      }
    } catch (e) { toast('Ungültiger Backup-Link', 'err'); return; }
    if (!data || !data.sets) { toast('Ungültiger Backup-Link', 'err'); return; }
    await this._mergeData(data, false);
  },

  // ── Datei importieren ──
  async importFile(file) {
    try {
      const payload = JSON.parse(await file.text());
      if (!payload.v || !payload.sets) { toast('Ungültige Backup-Datei', 'err'); return; }
      const date = new Date(payload.at).toLocaleDateString('de-DE');
      const ok = confirm(
        'Backup vom ' + date + ' importieren?\n\n'
        + payload.sets.length + ' Lernsets, ' + payload.cards.length + ' Karten\n\n'
        + 'Vorhandene Daten bleiben erhalten.'
      );
      if (!ok) return;
      await this._mergeData(payload, true);
    } catch (e) { toast('Import fehlgeschlagen: ' + e.message, 'err'); }
  },

  // ── Intern: Daten zusammenführen ──
  async _mergeData(payload, withBlobs) {
    const exSets  = new Set(DB.getSets().map(s => s.id));
    const exCards = new Set(DB.getCards().map(c => c.id));
    const exReps  = new Set(DB.getReps().map(r => r.cid));
    for (const s of payload.sets  || []) if (!exSets.has(s.id))   DB.saveSet(s);
    for (const c of payload.cards || []) if (!exCards.has(c.id))  DB.saveCard(c);
    for (const r of payload.reps  || []) if (!exReps.has(r.cid))  DB.saveRep(r);
    if (withBlobs) {
      for (const [k, entry] of Object.entries(payload.blobs || {})) {
        if (entry.t === 'ab') {
          const bin = atob(entry.d); const bytes = new Uint8Array(bin.length);
          for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
          await IDB.save(k, bytes.buffer);
        } else { await IDB.save(k, entry.d); }
      }
    }
    toast('Importiert: ' + (payload.sets || []).length + ' Lernsets', 'ok', 3500);
    render();
  },
};

// ═══════════════════════════════════
const UNDO = [];
function undoPush(action) { UNDO.push(action); if (UNDO.length > 20) UNDO.shift(); }

async function undoLast() {
  const action = UNDO.pop();
  if (!action) { toast('Nichts rückgängig zu machen'); return; }
  if (action.type === 'card') {
    DB.saveCard(action.card);
    if (action.imgData) await IDB.save('im_' + action.card.setId + '_' + action.card.id, action.imgData);
    toast('Karte wiederhergestellt', 'ok');
    render();
  } else if (action.type === 'set') {
    DB.saveSet(action.set);
    action.cards.forEach(c => DB.saveCard(c));
    action.reps.forEach(r => DB.saveRep(r));
    toast('Lernset wiederhergestellt', 'ok');
    VIEW = 'set'; SID = action.set.id; render();
  }
}

// ═══════════════════════════════════
// SM-2
// ═══════════════════════════════════
const SM2 = {
  init() { return { ef: 2.5, iv: 0, n: 0, next: Date.now(), st: 'NEW', lg: null }; },
  upd(r, g) {
    let { ef, iv, n } = r;
    if (g >= 3) { if (n === 0) iv = 1; else if (n === 1) iv = 6; else iv = Math.round(iv * ef); n++; }
    else { n = 0; iv = 1; }
    ef = Math.max(1.3, Math.round((ef + 0.1 - (5 - g) * (0.08 + (5 - g) * 0.02)) * 1000) / 1000);
    const st = n === 0 ? 'LEARNING' : iv >= 21 ? 'MASTERED' : 'REVIEWING';
    return { ef, iv, n, next: Date.now() + iv * 86400000, st, lg: g, cid: r.cid };
  },
  due(r) { return !r || Date.now() >= r.next; },
  prog(sid) {
    const cards = DB.getCards(sid); const tot = cards.length;
    if (!tot) return { pct: 0, lv: 'low', lbl: 'Keine Karten', mas: 0, rev: 0, due: 0, tot: 0 };
    const reps = cards.map(c => DB.getRep(c.id));
    const mas = reps.filter(r => r && r.st === 'MASTERED').length;
    const rev = reps.filter(r => r && r.st === 'REVIEWING').length;
    const due = cards.filter(c => this.due(DB.getRep(c.id))).length;
    const pct = Math.round(((mas + rev * 0.6) / tot) * 100);
    const lv = pct >= 80 ? 'ok' : pct >= 40 ? 'mid' : 'low';
    return { pct, lv, lbl: { ok: 'Prüfungsbereit', mid: 'In Bearbeitung', low: 'Noch am Lernen' }[lv], mas, rev, due, tot };
  },
  getDue(sid) {
    return DB.getCards(sid).map(c => ({ ...c, _r: DB.getRep(c.id) }))
      .filter(c => this.due(c._r))
      .sort((a, b) => { if (!a._r) return -1; if (!b._r) return 1; return a._r.next - b._r.next; });
  },
};

// ═══════════════════════════════════
// CANVAS — 2-Layer, A4, Zoom, Pinch
// ═══════════════════════════════════
const CV = {
  gridEl: null, drawEl: null, gCtx: null, dCtx: null,
  dn: false, lx: 0, ly: 0, tool: 'pen', color: '#1A1D2E', lw: 2,
  hist: [], hi: -1, grid: 'dotted',
  curPage: 0, pageCount: 1, cardId: null,
  zoom: 1.0, pinchDist: null, pinchIds: [],
  A4W: 1240, A4H: 1754,

  async mount(cardId, grid, startPage) {
    this.cardId = cardId; this.grid = grid || 'dotted';
    this.curPage = startPage || 0; this.zoom = 1.0;
    this.gridEl = document.getElementById('cv-grid');
    this.drawEl = document.getElementById('cv-draw');
    this.gridEl.width = this.A4W; this.gridEl.height = this.A4H;
    this.drawEl.width = this.A4W; this.drawEl.height = this.A4H;
    const cont = document.querySelector('.cv-container');
    cont.style.width = this.A4W + 'px'; cont.style.height = this.A4H + 'px';
    this.gCtx = this.gridEl.getContext('2d');
    this.dCtx = this.drawEl.getContext('2d');
    this.hist = []; this.hi = -1;
    this.drawGrid();
    await this.loadPage(this.curPage);
    this.applyZoom();
    this.attachEvents();
    this.updatePageUI();
  },

  drawGrid() {
    const g = this.gCtx, W = this.A4W, H = this.A4H;
    g.clearRect(0, 0, W, H);
    g.fillStyle = '#FFFFFF'; g.fillRect(0, 0, W, H);
    if (this.grid === 'dotted') {
      g.fillStyle = '#C0C8DF';
      for (let x = 32; x < W; x += 32) for (let y = 32; y < H; y += 32) { g.beginPath(); g.arc(x, y, 1.4, 0, Math.PI * 2); g.fill(); }
    } else {
      g.strokeStyle = '#D8DEFA'; g.lineWidth = 1;
      for (let x = 0; x <= W; x += 32) { g.beginPath(); g.moveTo(x, 0); g.lineTo(x, H); g.stroke(); }
      for (let y = 0; y <= H; y += 32) { g.beginPath(); g.moveTo(0, y); g.lineTo(W, y); g.stroke(); }
    }
  },

  async loadPage(p) {
    this.dCtx.clearRect(0, 0, this.A4W, this.A4H);
    const data = this.cardId ? await IDB.get('cv_' + this.cardId + '_' + p + '_d') : null;
    if (data) { const img = new Image(); await new Promise(r => { img.onload = r; img.src = data; }); this.dCtx.drawImage(img, 0, 0); }
    this.hist = []; this.hi = -1; this.saveH();
  },

  attachEvents() {
    const el = this.drawEl;
    el.onpointerdown = e => this.onDown(e);
    el.onpointermove = e => this.onMove(e);
    el.onpointerup = e => this.onUp(e);
    el.onpointerleave = e => this.onUp(e);
    el.style.touchAction = 'none';
    // Pinch zoom on the outer wrap
    const wrap = document.getElementById('cv-wrap-outer');
    if (wrap) {
      wrap.addEventListener('touchstart', e => this.pinchStart(e), { passive: false });
      wrap.addEventListener('touchmove', e => this.pinchMove(e), { passive: false });
      wrap.addEventListener('touchend', () => { this.pinchDist = null; });
    }
  },

  pinchStart(e) {
    if (e.touches.length === 2) {
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      this.pinchDist = Math.sqrt(dx * dx + dy * dy);
    }
  },
  pinchMove(e) {
    if (e.touches.length !== 2 || !this.pinchDist) return;
    e.preventDefault();
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const delta = dist / this.pinchDist;
    this.pinchDist = dist;
    this.setZoom(this.zoom * delta);
  },

  setZoom(z) {
    this.zoom = Math.min(3.0, Math.max(0.3, z));
    this.applyZoom();
    document.getElementById('cv-zoom-lbl').textContent = Math.round(this.zoom * 100) + '%';
  },
  applyZoom() {
    const layer = document.getElementById('cv-zoom-layer');
    if (layer) layer.style.transform = 'scale(' + this.zoom + ')';
    const cont = document.querySelector('.cv-container');
    if (cont) {
      cont.style.width = this.A4W + 'px';
      cont.style.height = this.A4H + 'px';
    }
    const layer2 = document.getElementById('cv-zoom-layer');
    if (layer2) {
      layer2.style.width = (this.A4W * this.zoom + 40) + 'px';
      layer2.style.height = (this.A4H * this.zoom + 40) + 'px';
    }
  },

  pos(e) {
    const rc = this.drawEl.getBoundingClientRect();
    return {
      x: (e.clientX - rc.left) * this.A4W / rc.width,
      y: (e.clientY - rc.top) * this.A4H / rc.height
    };
  },

  onDown(e) {
    // Two-finger: ignore (pan mode)
    if (e.isPrimary === false) return;
    e.preventDefault(); this.drawEl.setPointerCapture(e.pointerId); this.dn = true;
    const { x, y } = this.pos(e); this.lx = x; this.ly = y;
    const ctx = this.dCtx;
    if (this.tool === 'eraser') { ctx.globalCompositeOperation = 'destination-out'; }
    else { ctx.globalCompositeOperation = 'source-over'; ctx.fillStyle = this.color; }
    ctx.beginPath(); ctx.arc(x, y, this.tool === 'eraser' ? this.lw * 3 : this.lw / 2, 0, Math.PI * 2); ctx.fill();
  },
  onMove(e) {
    if (!this.dn || e.isPrimary === false) return; e.preventDefault();
    const { x, y } = this.pos(e);
    const p = e.pointerType === 'pen' && e.pressure > 0 ? e.pressure : 0.55;
    const ctx = this.dCtx;
    ctx.beginPath(); ctx.moveTo(this.lx, this.ly); ctx.lineTo(x, y);
    if (this.tool === 'eraser') {
      ctx.globalCompositeOperation = 'destination-out';
      ctx.strokeStyle = 'rgba(255,255,255,1)';
      ctx.lineWidth = this.lw * 6;
    } else {
      ctx.globalCompositeOperation = 'source-over';
      ctx.strokeStyle = this.color;
      ctx.lineWidth = this.lw * p * 1.8;
    }
    ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.stroke();
    this.lx = x; this.ly = y;
  },
  onUp(e) {
    if (!this.dn) return; this.dn = false;
    this.dCtx.globalCompositeOperation = 'source-over'; this.saveH();
  },

  saveH() {
    const id = this.dCtx.getImageData(0, 0, this.A4W, this.A4H);
    this.hist = this.hist.slice(0, this.hi + 1); this.hist.push(id);
    if (this.hist.length > 40) this.hist.shift();
    this.hi = this.hist.length - 1;
  },
  undo() { if (this.hi <= 0) return; this.hi--; this.dCtx.clearRect(0, 0, this.A4W, this.A4H); this.dCtx.putImageData(this.hist[this.hi], 0, 0); },
  redo() { if (this.hi >= this.hist.length - 1) return; this.hi++; this.dCtx.clearRect(0, 0, this.A4W, this.A4H); this.dCtx.putImageData(this.hist[this.hi], 0, 0); },
  clear() { this.dCtx.clearRect(0, 0, this.A4W, this.A4H); this.saveH(); },

  composite() {
    const tmp = document.createElement('canvas');
    tmp.width = this.A4W; tmp.height = this.A4H;
    const ctx = tmp.getContext('2d');
    ctx.drawImage(this.gridEl, 0, 0); ctx.drawImage(this.drawEl, 0, 0);
    return tmp.toDataURL('image/png');
  },

  async savePage() {
    if (!this.cardId) return;
    await IDB.save('cv_' + this.cardId + '_' + this.curPage + '_d', this.drawEl.toDataURL('image/png'));
    await IDB.save('cv_' + this.cardId + '_' + this.curPage, this.composite());
  },

  async addPage() {
    await this.savePage();
    this.curPage++;
    this.pageCount = Math.max(this.pageCount, this.curPage + 1);
    this.dCtx.clearRect(0, 0, this.A4W, this.A4H);
    this.hist = []; this.hi = -1; this.saveH(); this.updatePageUI();
  },
  async gotoPage(p) {
    if (p < 0) return;
    await this.savePage(); this.curPage = p;
    await this.loadPage(p); this.updatePageUI();
  },
  setGrid(g) { this.grid = g; this.drawGrid(); },

  updatePageUI() {
    const el = document.getElementById('cv-page-info');
    if (el) el.textContent = 'Seite ' + (this.curPage + 1) + ' / ' + Math.max(this.pageCount, this.curPage + 1);
    const pb = document.getElementById('cv-prev-btn');
    if (pb) pb.disabled = this.curPage === 0;
  },
};

// STATE

let VIEW = 'dash', SID = null, CID = null, CVCARD = null, CVGRID = 'dotted';
let STUDY = {}, QUIZ = {};

// ═══════════════════════════════════
// UTILS
// ═══════════════════════════════════
function esc(s) { return String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
function shuf(a) { return [...a].sort(() => Math.random() - .5); }
function fdate(ts) {
  if (!ts) return 'Nie';
  const d = new Date(ts), df = Math.floor((Date.now() - d) / 86400000);
  if (df === 0) return 'Heute'; if (df === 1) return 'Gestern';
  if (df < 7) return 'vor ' + df + ' Tagen';
  return d.toLocaleDateString('de-DE', { day: 'numeric', month: 'short' });
}
function dlBadge(dl) {
  if (!dl) return '';
  const d = new Date(dl); const n = new Date(); n.setHours(0, 0, 0, 0); d.setHours(0, 0, 0, 0);
  const days = Math.round((d - n) / 86400000);
  if (days < 0) return '<span class="dl-badge dl-soon">Abgelaufen</span>';
  if (days === 0) return '<span class="dl-badge dl-soon">Heute fällig</span>';
  if (days <= 7) return '<span class="dl-badge dl-soon">Noch ' + days + (days === 1 ? ' Tag' : ' Tage') + '</span>';
  return '<span class="dl-badge dl-ok">Frist: ' + d.toLocaleDateString('de-DE', { day: 'numeric', month: 'short' }) + '</span>';
}

function toast(msg, type, dur) {
  const el = document.createElement('div');
  el.className = 'toast' + (type ? ' ' + type : ''); el.textContent = msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity .3s'; setTimeout(() => el.remove(), 300); }, dur || 2600);
}

function doLatex(el) {
  if (!el || !window.renderMathInElement) return;
  try {
    renderMathInElement(el, {
      delimiters: [
        { left: '$$', right: '$$', display: true },
        { left: '\\[', right: '\\]', display: true },
        { left: '$', right: '$', display: false },
        { left: '\\(', right: '\\)', display: false },
      ],
      throwOnError: false, strict: false,
    });
  } catch (e) { }
}

function go(v, sid) { VIEW = v; if (sid !== undefined) SID = sid || null; render(); }

function mkRing(n, tot, sz) {
  sz = sz || 50;
  const r = (sz - 6) / 2, circ = 2 * Math.PI * r, p = tot > 0 ? n / tot : 0, dash = p * circ;
  const col = p >= .8 ? '#2A7D46' : p >= .4 ? '#B45309' : '#A8ADC8';
  return '<div class="ring" style="width:' + sz + 'px;height:' + sz + 'px;flex-shrink:0">'
    + '<svg width="' + sz + '" height="' + sz + '" style="transform:rotate(-90deg);display:block">'
    + '<circle cx="' + (sz/2) + '" cy="' + (sz/2) + '" r="' + r + '" fill="none" stroke="#E8EDFA" stroke-width="5"/>'
    + '<circle cx="' + (sz/2) + '" cy="' + (sz/2) + '" r="' + r + '" fill="none" stroke="' + col + '" stroke-width="5"'
    + ' stroke-dasharray="' + dash.toFixed(1) + ' ' + circ.toFixed(1) + '" stroke-linecap="round"/>'
    + '</svg><div class="ring-c">'
    + '<span class="ring-n">' + n + '</span><span class="ring-d">/' + tot + '</span>'
    + '</div></div>';
}

function mkNav(title, back, bv, bsid, acts) {

// Status pill helper
function statPill(rep) {
  if (!rep) return '<span class="pill pl-low" style="font-size:10px">Neu</span>';
  if (rep.st === 'MASTERED') return '<span class="pill pl-ok" style="font-size:10px">Gemeistert</span>';
  if (rep.st === 'REVIEWING') return '<span class="pill pl-mid" style="font-size:10px">Wiederholung</span>';
  return '<span class="pill pl-low" style="font-size:10px">Lernend</span>';
}

// ═══════════════════════════════════
// RESULT ANIMATION
// ═══════════════════════════════════
function mkResultSVG(pct) {
  const CIRC = 2 * Math.PI * 54;
  let col, titleText, sym;
  if (pct >= 80) {
    col = '#2A7D46'; titleText = 'Ausgezeichnet';
    sym = '<polyline id="res-sym" points="42,74 57,89 91,51" fill="none" stroke="' + col + '" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" style="stroke-dasharray:76;stroke-dashoffset:76"/>';
  } else if (pct >= 60) {
    col = '#4F72E3'; titleText = 'Gut gemacht';
    sym = '<polyline id="res-sym" points="42,74 57,89 91,51" fill="none" stroke="' + col + '" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" style="stroke-dasharray:76;stroke-dashoffset:76"/>';
  } else if (pct >= 40) {
    col = '#B45309'; titleText = 'Befriedigend';
    sym = '<line id="res-sym" x1="42" y1="70" x2="98" y2="70" fill="none" stroke="' + col + '" stroke-width="6" stroke-linecap="round" style="stroke-dasharray:56;stroke-dashoffset:56"/>';
  } else {
    col = '#E05252'; titleText = 'Weiter üben';
    sym = '<line id="res-sym1" x1="47" y1="47" x2="93" y2="93" stroke="' + col + '" stroke-width="6" stroke-linecap="round" style="stroke-dasharray:65;stroke-dashoffset:65"/>'
        + '<line id="res-sym2" x1="93" y1="47" x2="47" y2="93" stroke="' + col + '" stroke-width="6" stroke-linecap="round" style="stroke-dasharray:65;stroke-dashoffset:65"/>';
  }
  const svg = '<svg class="res-ring" viewBox="0 0 140 140" width="140" height="140">'
    + '<circle cx="70" cy="70" r="54" fill="none" stroke="#E8EDFA" stroke-width="8"/>'
    + '<circle id="res-ring" cx="70" cy="70" r="54" fill="none" stroke="' + col + '" stroke-width="8"'
    + ' stroke-linecap="round" transform="rotate(-90 70 70)"'
    + ' style="stroke-dasharray:' + CIRC.toFixed(1) + ';stroke-dashoffset:' + CIRC.toFixed(1) + '"/>'
    + sym + '</svg>';
  return { col, titleText, svg, CIRC };
}

function animResult() {
  const pctEl = document.getElementById('res-pct-num'); if (!pctEl) return;
  const pct = parseInt(pctEl.dataset.pct || '0');
  const { CIRC } = mkResultSVG(pct);
  const targetOffset = CIRC - (pct / 100) * CIRC;

  let t0 = null; const dur = 1300;
  function step(ts) {
    if (!t0) t0 = ts;
    const raw = Math.min((ts - t0) / dur, 1);
    const eased = 1 - Math.pow(1 - raw, 3);
    const ring = document.getElementById('res-ring');
    if (ring) ring.style.strokeDashoffset = CIRC - eased * (CIRC - targetOffset);
    pctEl.textContent = Math.round(eased * pct) + '%';
    if (raw < 1) { requestAnimationFrame(step); }
    else {
      // Animate symbol
      setTimeout(() => {
        ['res-sym', 'res-sym1', 'res-sym2'].forEach((id, i) => {
          const el = document.getElementById(id); if (!el) return;
          el.style.transition = 'stroke-dashoffset .5s ease ' + (i * 0.18) + 's';
          el.style.strokeDashoffset = '0';
        });
      }, 50);
    }
  }
  setTimeout(() => requestAnimationFrame(step), 80);
}

    const cor = STUDY.ans.filter(a => a.g >= 3).length, tot = STUDY.ans.length;

  const c = STUDY.cards[STUDY.idx], tot = STUDY.cards.length;

  const hasImg = c.ansImg, hasCv = (c.cvPages || 0) > 0;
  const isForm = /\$|\\\(|\\\[/.test(c.answer || '');

    + '<div class="face f-front"><div class="f-tag" style="color:var(--t4)">Frage</div><div class="f-q">' + esc(c.question) + '</div><div class="f-hint">Tippen zum Umdrehen</div></div>'

// ─── Quiz ───
function vQuiz() {
  const set = DB.getSet(SID); if (!set) return vDash();
  const all = DB.getCards(SID);
  if (all.length < 2) return mkNav(set.title, set.title, 'set', SID)
    + '<div class="page"><div class="empty"><div class="empty-ic"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div><div class="empty-t">Zu wenige Karten</div><div class="empty-s">Mindestens 2 Karten für Quiz.</div>'
    + '<button class="btn btn-ghost" data-a="go" data-v="set" data-sid="' + SID + '" style="margin-top:14px">Zurück</button></div></div>';
  if (!QUIZ.cards || QUIZ.cards.length === 0) { QUIZ = { cards: shuf(all), idx: 0, sc: 0, opts: [], ci: null, sel: null, conf: false }; bOpts(all); }
  return renderQuiz();
}

function bOpts(all) {
  const c = QUIZ.cards[QUIZ.idx]; if (!c) return;
  const correct = (c.answer || '').split('\n')[0].slice(0, 120);
  const others = all.filter(x => x.id !== c.id).map(x => (x.answer || '').split('\n')[0].slice(0, 120));
  const opts = shuf([...shuf(others).slice(0, 3), correct]);
  QUIZ.opts = opts; QUIZ.ci = opts.indexOf(correct); QUIZ.sel = null; QUIZ.conf = false;
}

function renderQuiz() {
  const set = DB.getSet(SID);
  if (QUIZ.idx >= QUIZ.cards.length) {
    const acc = Math.round(QUIZ.sc / QUIZ.cards.length * 100);
    const { col, titleText, svg } = mkResultSVG(acc);
    return mkNav(set.title, set.title, 'set', SID)
      + '<div class="page"><div class="res-wrap a0">'
      + svg
      + '<div style="position:relative;margin-top:-130px;text-align:center;pointer-events:none">'
      + '<div class="res-pct-num" id="res-pct-num" style="color:' + col + '" data-pct="' + acc + '">0%</div>'
      + '<div class="res-pct-lbl">Ergebnis</div>'
      + '</div>'
      + '<div style="margin-top:8px">'
      + '<div class="res-title">' + titleText + '</div>'
      + '<div class="res-sub" style="margin-top:4px">' + QUIZ.sc + ' von ' + QUIZ.cards.length + ' richtig</div>'
      + '</div>'
      + '<div style="display:flex;gap:10px;margin-top:8px">'
      + '<button class="btn btn-ghost" data-a="go" data-v="set" data-sid="' + SID + '">Fertig</button>'
      + '<button class="btn btn-blue" data-a="rqz">Nochmal</button>'
      + '</div></div></div>';
  }
  const c = QUIZ.cards[QUIZ.idx], pct = Math.round(QUIZ.idx / QUIZ.cards.length * 100);
  const oh = QUIZ.opts.map(function(opt, i) {
    let cls = 'choice';
    if (QUIZ.conf) { if (i === QUIZ.ci) cls += ' correct'; else if (i === QUIZ.sel) cls += ' wrong'; }
    else if (QUIZ.sel === i) cls += ' sel';
    const lbl = (QUIZ.conf && i === QUIZ.ci) ? '✓' : (QUIZ.conf && i === QUIZ.sel && i !== QUIZ.ci) ? '✕' : String.fromCharCode(65 + i);
    return '<button class="' + cls + '" data-a="qs" data-i="' + i + '"' + (QUIZ.conf ? ' disabled' : '') + '><span class="c-lbl">' + lbl + '</span><span>' + esc(opt) + '</span></button>';
  }).join('');
  return mkNav(set.title, set.title, 'set', SID)
    + '<div class="page">'
    + '<div style="display:flex;justify-content:space-between;font-size:12px;color:var(--t4);margin-bottom:7px;font-weight:600"><span>Frage ' + (QUIZ.idx+1) + ' / ' + QUIZ.cards.length + '</span><span style="color:var(--ok)">' + QUIZ.sc + ' richtig</span></div>'
    + '<div class="pbar" style="margin-bottom:15px"><div class="pfill p-ok" style="width:' + pct + '%"></div></div>'
    + '<div class="card cp a0" style="margin-bottom:12px"><div class="sec" style="margin-bottom:7px">Frage</div><div style="font-size:18px;font-weight:700;line-height:1.5;letter-spacing:-.01em">' + esc(c.question) + '</div></div>'
    + '<div style="display:flex;flex-direction:column;gap:8px;margin-bottom:12px">' + oh + '</div>'
    + (!QUIZ.conf
        ? '<button class="btn btn-blue btn-full" data-a="qc"' + (QUIZ.sel === null ? ' disabled' : '') + '>Bestätigen</button>'
        : '<button class="btn btn-blue btn-full" data-a="qn">' + (QUIZ.idx < QUIZ.cards.length - 1 ? 'Nächste Frage →' : 'Ergebnis anzeigen') + '</button>')
    + '</div>';
}

function closeCv() { const ov = document.getElementById('cv-ov'); if (ov) ov.remove(); }

async function saveCv() {
  if (!CVCARD) { closeCv(); return; }
  await CV.savePage();
  const total = CV.curPage + 1;
  const card = DB.getCard(CVCARD);
  if (card) { card.cvPages = Math.max(card.cvPages || 0, total); DB.saveCard(card); }
  toast('Zeichnung gespeichert', 'ok'); closeCv(); render();
}

// ═══════════════════════════════════
// RENDER
// ═══════════════════════════════════
async function render() {
  const app = document.getElementById('app');
  let html = '';
  switch (VIEW) {
    case 'dash':  html = vDash(); break;
    case 'set':   html = await vSet(); break;
    case 'newset': html = vCreateSet(); break;
    case 'editset': html = vEditSet(); break;
    case 'ce':    html = vCardEditor(); break;
    case 'study': html = vStudy(); break;
    case 'quiz':  html = vQuiz(); break;
    default:      html = vDash();
  }
  app.innerHTML = html;
  window.scrollTo(0, 0);
  await loadImgs(app);
  doLatex(app);
  setupEditor();
  animResult();
}

async function loadImgs(root) {
  const els = root.querySelectorAll('[data-imgkey]');
  for (const el of els) {
    try { const d = await IDB.get(el.dataset.imgkey); if (d) el.src = d; } catch (e) { }
  }
}

function setupEditor() {
  const ta = document.getElementById('ce-a'), pr = document.getElementById('lp');
  if (ta && pr) {
    function upd() {
      const v = ta.value;
      while (pr.firstChild) pr.removeChild(pr.firstChild);
      if (v) { pr.appendChild(document.createTextNode(v)); doLatex(pr); }
      else pr.innerHTML = '<span style="color:var(--t4)">Vorschau erscheint beim Tippen…</span>';
    }
    ta.addEventListener('input', upd); upd();
  }
  const iu = document.getElementById('img-up');
  if (iu) iu.addEventListener('change', e => {
    const f = e.target.files[0]; if (!f) return;
    const fr = new FileReader(); fr.onload = ev => {
      const w = document.getElementById('img-wrap');
      let img = document.getElementById('img-prev');
      if (!img) { img = document.createElement('img'); img.id = 'img-prev'; img.style.cssText = 'max-height:160px;border-radius:8px;margin-bottom:10px;border:1px solid var(--bd2);display:block'; w.prepend(img); }
      img.src = ev.target.result; img.dataset.pending = ev.target.result;
    }; fr.readAsDataURL(f);
  });
  // Load existing canvas thumbnails in editor
  if (CID) {
    document.querySelectorAll('[data-imgkey^="cv_"]').forEach(async el => {
      if (!el.src || el.src.endsWith('#') || el.src.endsWith('/')) {
        try { const d = await IDB.get(el.dataset.imgkey); if (d) el.src = d; } catch (e) { }
      }
    });
  }
}

// ═══════════════════════════════════
// EVENTS
// ═══════════════════════════════════
document.addEventListener('click', async e => {
  const t = e.target.closest('[data-a]'); if (!t) return;
  const a = t.dataset.a, sid = t.dataset.sid, cid = t.dataset.cid;
  e.stopPropagation();

  switch (a) {
    // Navigation
    case 'go':
      VIEW = t.dataset.v || 'dash';
      if (sid !== undefined) SID = sid || null;
      render(); break;

    // Backup
    case 'backup-export': await BACKUP.exportFile(); break;
    case 'backup-link':   await BACKUP.exportLink(); break;
    case 'os': SID = sid; VIEW = 'set'; render(); break;
    case 'newset': VIEW = 'newset'; render(); break;
    case 'editset': VIEW = 'editset'; render(); break;
    case 'newcard': CID = null; VIEW = 'ce'; render(); break;
    case 'ec': CID = cid; VIEW = 'ce'; render(); break;
    case 'sm': SID = sid || SID; STUDY = {}; VIEW = 'study'; render(); break;
    case 'qm': SID = sid || SID; QUIZ = {}; VIEW = 'quiz'; render(); break;

    // Set CRUD
    case 'saveset': {
      const title = (document.getElementById('cs-t')?.value || '').trim();
      if (!title) { toast('Bitte Titel eingeben', 'err'); break; }
      const ns = {
        id: DB.uid(), title,
        mod: (document.getElementById('cs-m')?.value || '').trim() || null,
        desc: (document.getElementById('cs-d')?.value || '').trim() || null,
        dl: document.getElementById('cs-dl')?.value || null,
      };
      DB.saveSet(ns); SID = ns.id; toast('Lernset erstellt', 'ok'); VIEW = 'set'; render(); break;
    }
    case 'updset': {
      const s = DB.getSet(SID); if (!s) break;
      const title = (document.getElementById('es-t')?.value || '').trim();
      if (!title) { toast('Titel darf nicht leer sein', 'err'); break; }
      s.title = title;
      s.mod = (document.getElementById('es-m')?.value || '').trim() || null;
      s.desc = (document.getElementById('es-d')?.value || '').trim() || null;
      s.dl = document.getElementById('es-dl')?.value || null;
      DB.saveSet(s); toast('Gespeichert', 'ok'); VIEW = 'set'; render(); break;
    }
    case 'delset': {
      const s = DB.getSet(SID || sid); if (!s) break;
      const setToDelete = { ...s };
      const cardsToDelete = DB.getCards(s.id).map(c => ({ ...c }));
      const repsToDelete = DB.getReps().filter(r => cardsToDelete.some(c => c.id === r.cid)).map(r => ({ ...r }));
      confirmDel('Lernset löschen', '"' + s.title + '" und alle Karten permanent löschen?', async () => {
        undoPush({ type: 'set', set: setToDelete, cards: cardsToDelete, reps: repsToDelete });
        await DB.delSet(s.id); toast('Lernset gelöscht'); SID = null; VIEW = 'dash'; render();
      }); break;
    }

    // Card CRUD
    case 'savecard': {
      const q = (document.getElementById('ce-q')?.value || '').trim();
      const a2 = (document.getElementById('ce-a')?.value || '').trim();
      if (!q || !a2) { toast('Frage und Antwort erforderlich', 'err'); break; }
      const diff = document.getElementById('ce-d')?.value || 'MEDIUM';
      const isEdit = !!CID;
      const card = isEdit ? { ...DB.getCard(CID) } : { id: DB.uid(), setId: SID };
      card.question = q; card.answer = a2; card.diff = diff;
      const ip = document.getElementById('img-prev');
      if (ip && ip.dataset.pending) {
        await IDB.save('im_' + SID + '_' + card.id, ip.dataset.pending);
        card.ansImg = true;
      }
      DB.saveCard(card); toast(isEdit ? 'Karte gespeichert' : 'Karte hinzugefügt', 'ok');
      CID = null; VIEW = 'set'; render(); break;
    }
    case 'dc': {
      const cardToDelete = DB.getCard(cid); if (!cardToDelete) break;
      const imgData = cardToDelete.ansImg ? await IDB.get('im_' + SID + '_' + cid) : null;
      confirmDel('Karte löschen', 'Diese Karteikarte permanent löschen?', async () => {
        undoPush({ type: 'card', card: { ...cardToDelete }, imgData });
        await DB.delCard(cid); toast('Karte gelöscht'); render();
      }); break;
    }
    case 'dupc': {
      const src = DB.getCard(cid); if (!src) break;
      const nc = { id: DB.uid(), setId: SID, question: src.question, answer: src.answer, diff: src.diff || 'MEDIUM', ansImg: false, cvPages: 0 };
      DB.saveCard(nc); toast('Karte dupliziert', 'ok'); render(); break;
    }
    case 'rmimg': {
      const c = DB.getCard(CID); if (!c) break;
      await IDB.del('im_' + SID + '_' + c.id); c.ansImg = false; DB.saveCard(c); toast('Bild entfernt'); render(); break;
    }
    case 'rmcv': {
      const c = DB.getCard(CID); if (!c) break;
      await IDB.delPfx('cv_' + c.id); c.cvPages = 0; DB.saveCard(c); toast('Zeichnung entfernt'); render(); break;
    }

    // PDF
    case 'dpdf': {
      confirmDel('PDF entfernen', 'PDF-Anhang von diesem Set entfernen?', async () => {
        const s = DB.getSet(SID); if (!s) return;
        await IDB.del('pdf_' + SID); delete s.pdfName; DB.saveSet(s); toast('PDF entfernt'); render();
      }); break;
    }
    case 'vpdf': {
      try {
        const d = await IDB.get('pdf_' + SID); if (!d) { toast('PDF nicht gefunden', 'err'); break; }
        const url = URL.createObjectURL(new Blob([d], { type: 'application/pdf' }));
        const link = document.createElement('a'); link.href = url; link.target = '_blank'; link.rel = 'noopener';
        document.body.appendChild(link); link.click(); document.body.removeChild(link);
        setTimeout(() => URL.revokeObjectURL(url), 5000);
      } catch { toast('Fehler beim Öffnen', 'err'); }
      break;
    }

    // Canvas tools
    case 'ct': {
      CV.tool = t.dataset.t;
      document.querySelectorAll('[data-a="ct"]').forEach(b => b.classList.toggle('on', b.dataset.t === t.dataset.t));
      break;
    }
    case 'cc': {
      CV.color = t.dataset.c; CV.tool = 'pen';
      document.querySelectorAll('.cdot').forEach(d => d.classList.toggle('on', d.dataset.c === t.dataset.c));
      document.getElementById('tb-pen')?.classList.add('on');
      document.getElementById('tb-era')?.classList.remove('on');
      break;
    }
    case 'cundo': CV.undo(); break;
    case 'credo': CV.redo(); break;
    case 'cclr': if (confirm('Aktuelle Seite leeren?')) CV.clear(); break;
    case 'csav': await saveCv(); break;
    case 'cclose': closeCv(); break;
    case 'cvadd': await CV.addPage(); break;
    case 'cvprev': if (CV.curPage > 0) await CV.gotoPage(CV.curPage - 1); break;
    case 'cvnext': await CV.gotoPage(CV.curPage + 1); break;
    case 'cvzin': CV.setZoom(CV.zoom * 1.25); break;
    case 'cvzout': CV.setZoom(CV.zoom / 1.25); break;
    case 'ocv': await openCanvas(CID, DB.getCard(CID)?.cvPages || 1); break;
    case 'vcv': await openCanvas(cid, DB.getCard(cid)?.cvPages || 1); break;

    // Zoom image
    case 'zimg': {
      const d = await IDB.get('im_' + SID + '_' + cid); if (!d) break;
      const lb = document.createElement('div'); lb.className = 'lb';
      lb.innerHTML = '<img src="' + d + '" alt="">'; lb.onclick = () => lb.remove();
      document.body.appendChild(lb); break;
    }

    // Study
    case 'flip': STUDY.fl = !STUDY.fl; render(); break;
    case 'sas': {
      const grade = parseInt(t.dataset.g); const c = STUDY.cards[STUDY.idx]; if (!c) break;
      const rep = DB.getRep(c.id) || SM2.init(); DB.saveRep({ ...SM2.upd({ ...rep, cid: c.id }, grade), cid: c.id });
      STUDY.ans.push({ g: grade }); STUDY.idx++; STUDY.fl = false; render(); break;
    }
    case 'rstu': STUDY = {}; VIEW = 'study'; render(); break;

    // Quiz
    case 'qs': if (!QUIZ.conf) { QUIZ.sel = parseInt(t.dataset.i); render(); } break;
    case 'qc': {
      if (QUIZ.sel === null) break; QUIZ.conf = true;
      const ok = QUIZ.sel === QUIZ.ci; if (ok) QUIZ.sc++;
      const c = QUIZ.cards[QUIZ.idx]; if (c) { const r = DB.getRep(c.id) || SM2.init(); DB.saveRep({ ...SM2.upd({ ...r, cid: c.id }, ok ? 4 : 1), cid: c.id }); }
      render(); break;
    }
    case 'qn': QUIZ.idx++; if (QUIZ.idx < QUIZ.cards.length) bOpts(DB.getCards(SID)); render(); break;
    case 'rqz': QUIZ = {}; VIEW = 'quiz'; render(); break;
  }
});

document.addEventListener('change', async e => {
  const t = e.target;
  if (t.dataset.a === 'updf') {
    const f = t.files[0]; if (!f) return;
    if (f.type !== 'application/pdf') { toast('Nur PDF-Dateien', 'err'); return; }
    if (f.size > 80 * 1024 * 1024) { toast('Max. 80 MB', 'err'); return; }
    const ab = await f.arrayBuffer();
    await IDB.save('pdf_' + SID, ab);
    const s = DB.getSet(SID); if (!s) return;
    s.pdfName = f.name; DB.saveSet(s); toast('PDF angehängt', 'ok'); render();
  }
});

// Grid change in canvas
document.addEventListener('change', e => {
  if (e.target.id === 'grid-s') { CVGRID = e.target.value; CV.setGrid(CVGRID); }
});

// KEYBOARD SHORTCUTS
document.addEventListener('keydown', async e => {
  // Modal: Enter = confirm, ESC = close
  const modal = document.getElementById('cm');
  if (modal) {
    if (e.key === 'Escape') { e.preventDefault(); closeModal(); return; }
    if (e.key === 'Enter' && _modalOk) { e.preventDefault(); const fn = _modalOk; closeModal(); fn(); return; }
  }
  // ESC: close canvas, lightbox
  if (e.key === 'Escape') {
    const lb = document.querySelector('.lb'); if (lb) { lb.remove(); return; }
    const cv = document.getElementById('cv-ov'); if (cv) { closeCv(); return; }
  }
  // Ctrl/Cmd + Z: Undo
  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
    e.preventDefault();
    // Canvas undo
    const cv = document.getElementById('cv-ov'); if (cv) { CV.undo(); return; }
    await undoLast();
  }
  // Ctrl/Cmd + Shift + Z or Ctrl+Y: Redo (canvas)
  if (((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'z') || ((e.ctrlKey || e.metaKey) && e.key === 'y')) {
    e.preventDefault();
    const cv = document.getElementById('cv-ov'); if (cv) { CV.redo(); }
  }
});

// ═══════════════════════════════════
// INIT
// ═══════════════════════════════════
IDB.init().then(async () => {
  await BACKUP.checkUrlHash(); // Backup-Link beim Start prüfen
  render();
}).catch(() => render());
</script>
